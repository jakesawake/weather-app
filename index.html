<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <h1>Weather Today</h1>
    <div class="location-form-container">
      <form action="#" id="location-form">
        <label for="location">Enter City here:</label>
        <input type="text" name="location" value="" placeholder="Toronto" />
        <button type="submit" id="submit-form-button">Submit</button>
      </form>
      <div class="loading-spinner hidden"></div>
    </div>
    <div class="weather-data-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
